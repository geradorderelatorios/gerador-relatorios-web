<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Primeiro acesso - RL Metais</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --surface: #ffffff;
      --text: #111111;
      --muted: #66717f;
      --line: #d8dde5;
      --primary: #0057b8;
      --primary-dark: #003f87;
      font-family: Arial, Helvetica, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(0, 87, 184, 0.10), transparent 34rem),
        linear-gradient(180deg, #f8fafc 0%, var(--bg) 42%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(460px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
      padding: 32px;
    }

    .eyebrow {
      color: var(--primary);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      margin: 0 0 8px;
    }

    h1 {
      font-size: 28px;
      line-height: 1.15;
      margin: 0 0 22px;
    }

    form {
      display: grid;
      gap: 16px;
    }

    label {
      color: #334155;
      display: grid;
      font-size: 14px;
      font-weight: 700;
      gap: 6px;
    }

    input {
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
      min-height: 44px;
      padding: 10px 12px;
      width: 100%;
    }

    input:focus {
      border-color: var(--primary);
      outline: 3px solid rgba(0, 87, 184, 0.12);
    }

    button {
      background: var(--primary);
      border: 1px solid var(--primary);
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      min-height: 46px;
      padding: 12px 16px;
    }

    button:hover {
      background: var(--primary-dark);
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      margin: -6px 0 6px;
    }
  </style>
</head>
<body>
  <main class="panel">
    <form method="post">
      <div>
        <p class="eyebrow">Primeiro acesso</p>
        <h1>Criar empresa e usuário administrador</h1>
        <p class="hint">Configure a conta principal para acessar o sistema de relatórios.</p>
      </div>

      <label>Empresa
        <input name="organization_name" required autofocus>
      </label>

      <label>Seu nome
        <input name="name" required>
      </label>

      <label>E-mail
        <input name="email" type="email" required>
      </label>

      <label>Senha
        <input name="password" type="password" minlength="6" required>
      </label>

      <button type="submit">Criar acesso</button>
    </form>
  </main>
</body>
</html>
