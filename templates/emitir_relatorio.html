{% extends "base.html" %}
{% block content %}
<div class="breadcrumb"><span>Relatórios</span><span>›</span><strong>Emitir relatórios</strong></div>

<form class="panel form form-card" method="post" enctype="multipart/form-data">
  <div class="page-head">
    <div>
      <h1>Emitir relatórios</h1>
      <p>Preencha as informações abaixo para gerar seu relatório.</p>
    </div>
    <a class="pill-action" href="{{ url_for('insumos') }}">Cadastrar insumos <span>+</span></a>
  </div>

  <div class="report-options">
    <label class="check-option">
      <input name="incluir_lp" type="checkbox" value="1" checked>
      <span class="option-icon"><svg><use href="#icon-droplet"></use></svg></span>
      <span>Gerar Relatório de<br>Líquidos Penetrantes</span>
    </label>
    <label class="check-option">
      <input name="incluir_pm" type="checkbox" value="1">
      <span class="option-icon"><svg><use href="#icon-magnet"></use></svg></span>
      <span>Gerar Relatório de<br>Partículas Magnéticas</span>
    </label>
    <label class="check-option">
      <input name="incluir_us" type="checkbox" value="1">
      <span class="option-icon"><svg><use href="#icon-waves"></use></svg></span>
      <span>Gerar Relatório de<br>Ultrassom</span>
    </label>
  </div>

  <div class="grid two">
    <label>Formato de saída
      <span class="input-icon"><span><svg><use href="#icon-files"></use></svg></span>
        <select name="output_mode">
          <option value="unico">Gerar todos em um único arquivo</option>
          <option value="separados">Gerar laudos separados</option>
        </select>
      </span>
    </label>
    <label>Cliente *
      <span class="input-icon"><span><svg><use href="#icon-users"></use></svg></span>
        <select name="cliente_id" required>
          <option value="">Selecione...</option>
          {% for cliente in clientes %}
            <option value="{{ cliente.id }}">{{ cliente.razao_social }}</option>
          {% endfor %}
        </select>
      </span>
    </label>
  </div>

  <div class="grid report-top">
    <label>Número do relatório *
      <span class="input-icon"><span><svg><use href="#icon-hash"></use></svg></span><input name="NUMRELATORIO" placeholder="Auto (será gerado)" required></span>
    </label>
    <label>Data da inspeção
      <span class="input-icon"><span><svg><use href="#icon-calendar"></use></svg></span><input name="DATA_INSP" type="date" value="{{ today }}"></span>
    </label>
    <label>Laudo
      <span class="input-icon"><span><svg><use href="#icon-shield"></use></svg></span>
        <select name="LAUDO">
          <option value="A">Aprovado</option>
          <option value="R">Reprovado</option>
        </select>
      </span>
    </label>
  </div>

  <div class="grid report-data">
    <label>Peça inspecionada
      <input name="PECA_INSP" placeholder="Ex.: Eixo, Tubulação, Solda...">
    </label>
    <label>Número do desenho / OP
      <input name="NUM_DESENHO" placeholder="Ex.: 12345-OP-01">
    </label>
    <label>Quantidade
      <input name="QUANTIDADE" placeholder="Ex.: 2 unidades">
    </label>
    <label>Local da inspeção
      <input name="LOCAL_INSP" placeholder="Ex.: Oficina, Campo, Fábrica...">
    </label>
    <label>Temperatura
      <input name="TEMPERATURA" placeholder="Ex.: 25°C">
    </label>
    <label>Condição da superfície
      <input name="COND_SUPERFICIAL" placeholder="Ex.: Limpa e seca">
    </label>
    <label>Material
      <input name="MATERIAL" placeholder="Ex.: Aço Carbono, Inox...">
    </label>
    <label>Região inspecionada
      <input name="REGIAO_INSP" placeholder="Ex.: Solda longitudinal">
    </label>
    <label>Espessura
      <input name="ESPESSURA" placeholder="Ex.: 12,5 mm">
    </label>
  </div>

  <div class="section-line"><h2>Insumos</h2></div>
  <div class="grid three">
    <label>Líquido penetrante
      <span class="input-icon"><span><svg><use href="#icon-droplet"></use></svg></span>
        <select name="penetrante_id">
          <option value="">Selecione...</option>
          {% for insumo in penetrantes %}
            <option value="{{ insumo.id }}">{{ insumo.nome }}</option>
          {% endfor %}
        </select>
      </span>
    </label>
    <label>Revelador
      <span class="input-icon"><span><svg><use href="#icon-box"></use></svg></span>
        <select name="revelador_id">
          <option value="">Selecione...</option>
          {% for insumo in reveladores %}
            <option value="{{ insumo.id }}">{{ insumo.nome }}</option>
          {% endfor %}
        </select>
      </span>
    </label>
    <label>Partícula magnética
      <span class="input-icon"><span><svg><use href="#icon-magnet"></use></svg></span>
        <select name="particula_id">
          <option value="">Selecione...</option>
          {% for insumo in particulas %}
            <option value="{{ insumo.id }}">{{ insumo.nome }}</option>
          {% endfor %}
        </select>
      </span>
    </label>
  </div>

  <div class="section-line"><h2>Fotos</h2></div>
  <div class="grid three">
    <label>Foto 1 / capa
      <input name="FOTO_1" type="file" accept="image/*">
    </label>
    <label>Foto 2
      <input name="FOTO_2" type="file" accept="image/*">
    </label>
    <label>Foto 3
      <input name="FOTO_3" type="file" accept="image/*">
    </label>
  </div>
  <p class="empty">Formatos aceitos: JPG, PNG. Tamanho máximo: 10MB por arquivo.</p>

  <button class="submit-wide" type="submit">▧ &nbsp; Gerar relatório</button>
</form>
{% endblock %}
